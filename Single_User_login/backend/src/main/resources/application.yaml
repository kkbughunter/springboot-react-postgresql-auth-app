spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5432/auth
    username: postgres
    password: 1234567890
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        '[format_sql]': true

server:
  port: 8080

jwt:
  # 32-byte base64 secret — change this in production
  secret: dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIGp3dCBhdXRoZW50aWNhdGlvbg==
  access-expiration: 900000       # 15 minutes in milliseconds
  refresh-expiration: 604800000   # 7 days in milliseconds
